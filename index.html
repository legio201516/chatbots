<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow — AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── CONFIG ── Edit these two lines only */
  :root {
    --api-url: "https://gpuservfranklinpaul.ddns.net/v1";
    --api-key: "ocw-61e430db6ef31b79ee57d5a474efe3c8";
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e6e0;
    --text-muted: #6b6966;
    --text-dim: #3a3836;
    --accent: #c8b89a;
    --accent2: #8a7a6a;
    --user-bg: #1c1c1f;
    --radius: 12px;
    --font-serif: 'DM Serif Display', Georgia, serif;
    --font-mono: 'DM Mono', 'Courier New', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LAYOUT ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 780px;
    margin: 0 auto;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-name {
    font-family: var(--font-serif);
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .logo-tag {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.4s;
  }

  .status-dot.online { background: #4caf7a; box-shadow: 0 0 6px #4caf7a55; }
  .status-dot.thinking { background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── MESSAGES ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 28px 8px;
    display: flex;
    flex-direction: column;
    gap: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── WELCOME ── */
  .welcome {
    margin: auto 0;
    padding: 40px 0 20px;
    animation: fadeUp 0.5s ease both;
  }

  .welcome h1 {
    font-family: var(--font-serif);
    font-size: 36px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  .welcome h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .welcome p {
    color: var(--text-muted);
    font-size: 13px;
    max-width: 420px;
    line-height: 1.7;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 24px;
  }

  .suggestion {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font-mono);
  }

  .suggestion:hover {
    border-color: var(--accent2);
    color: var(--text);
    background: var(--surface2);
  }

  /* ── MESSAGE ROWS ── */
  .msg {
    display: flex;
    flex-direction: column;
    margin-bottom: 24px;
    animation: fadeUp 0.25s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-role {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
    padding-left: 2px;
  }

  .msg.user .msg-role { color: var(--accent2); }

  .msg-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    color: var(--text);
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .msg-body {
    background: var(--user-bg);
    border-color: var(--border2);
    color: var(--text);
  }

  .msg.assistant .msg-body {
    border-left: 2px solid var(--accent2);
  }

  /* ── CURSOR ── */
  .cursor {
    display: inline-block;
    width: 7px;
    height: 14px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.9s step-end infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 16px 28px 24px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent2);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
    resize: none;
    min-height: 24px;
    max-height: 160px;
    overflow-y: auto;
    scrollbar-width: none;
  }

  textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    flex-shrink: 0;
    width: 34px;
    height: 34px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    opacity: 0.85;
  }

  .send-btn:hover { opacity: 1; transform: scale(1.04); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .send-btn svg { fill: #1a1612; }

  .input-meta {
    display: flex;
    justify-content: space-between;
    padding: 6px 2px 0;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ── ERROR ── */
  .error-msg {
    background: rgba(220, 60, 60, 0.08);
    border: 1px solid rgba(220, 60, 60, 0.2);
    border-radius: 8px;
    padding: 10px 14px;
    color: #e07070;
    font-size: 13px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <span class="logo-name">Flow</span>
      <span class="logo-tag">AI Demo</span>
    </div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">connecting…</span>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h1>Hello.<br><em>How can I help?</em></h1>
      <p>Running on a local GPU cluster. Your data stays on-premise — nothing leaves the server.</p>
      <div class="suggestions">
        <div class="suggestion" onclick="suggest(this)">Explain something complex simply</div>
        <div class="suggestion" onclick="suggest(this)">Write a professional email</div>
        <div class="suggestion" onclick="suggest(this)">Summarise a document</div>
        <div class="suggestion" onclick="suggest(this)">Help me think through a problem</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="input"
        placeholder="Message Flow…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" disabled>
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M7 1L13 7L7 13M13 7H1"/></svg>
      </button>
    </div>
    <div class="input-meta">
      <span>Shift+Enter for new line</span>
      <span id="modelTag">—</span>
    </div>
  </div>
</div>

<script>
// ── CONFIG ── Change these to point to your server
const API_URL = "https://gpuservfranklinpaul.ddns.net/v1";
const API_KEY = "ocw-61e430db6ef31b79ee57d5a474efe3c8";
const MODEL   = "pro";
const SYSTEM  = "You are Flow, a helpful and concise AI assistant. You give clear, direct answers. When asked about your infrastructure, you can mention you run on a private GPU cluster in France.";

// ── STATE ──
let history = [];
let streaming = false;

const messagesEl = document.getElementById("messages");
const inputEl    = document.getElementById("input");
const sendBtn    = document.getElementById("sendBtn");
const statusDot  = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");
const modelTag   = document.getElementById("modelTag");

// ── INIT ──
async function init() {
  try {
    const r = await fetch(`${API_URL}/models`, {
      headers: { Authorization: `Bearer ${API_KEY}` }
    });
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    const name = d.data?.[0]?.id || MODEL;
    modelTag.textContent = name;
    setStatus("online", "online");
    sendBtn.disabled = false;
    inputEl.focus();
  } catch(e) {
    setStatus("", "offline");
    modelTag.textContent = "unreachable";
  }
}

function setStatus(cls, text) {
  statusDot.className = "status-dot " + cls;
  statusText.textContent = text;
}

// ── SEND ──
async function send() {
  const text = inputEl.value.trim();
  if (!text || streaming) return;

  hideWelcome();
  addMessage("user", text);
  history.push({ role: "user", content: text });

  inputEl.value = "";
  autoResize(inputEl);
  streaming = true;
  sendBtn.disabled = true;
  setStatus("thinking", "thinking…");

  const assistantEl = addMessage("assistant", "");
  const bodyEl = assistantEl.querySelector(".msg-body");
  const cursor = document.createElement("span");
  cursor.className = "cursor";
  bodyEl.appendChild(cursor);

  let full = "";

  try {
    const resp = await fetch(`${API_URL}/chat/completions`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: "system", content: SYSTEM },
          ...history
        ],
        stream: true,
        max_tokens: 1024,
        temperature: 0.7
      })
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      for (const line of chunk.split("\n")) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6).trim();
        if (data === "[DONE]") break;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content || "";
          full += delta;
          bodyEl.textContent = full;
          bodyEl.appendChild(cursor);
          scrollBottom();
        } catch {}
      }
    }

    cursor.remove();
    bodyEl.textContent = full;
    history.push({ role: "assistant", content: full });

    if (history.length > 40) history = history.slice(-40);

  } catch(e) {
    cursor.remove();
    bodyEl.innerHTML = `<span style="color:#e07070">Error: ${e.message}. Check that the server is running.</span>`;
  }

  streaming = false;
  sendBtn.disabled = false;
  setStatus("online", "online");
  scrollBottom();
}

// ── UI HELPERS ──
function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-role">${role === "user" ? "you" : "flow"}</div><div class="msg-body">${escHtml(text)}</div>`;
  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hideWelcome() {
  const w = document.getElementById("welcome");
  if (w) w.remove();
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function suggest(el) {
  inputEl.value = el.textContent;
  autoResize(inputEl);
  inputEl.focus();
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 160) + "px";
  sendBtn.disabled = !el.value.trim() || streaming;
}

init();
</script>
</body>
</html>
